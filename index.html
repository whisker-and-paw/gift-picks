<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7C5CBF">
<title>人格镜像 · MBTI 深度解析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#F5F0FF 0%,#FFF5F5 100%);color:#3A2A4A;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input{font-family:inherit;font-size:inherit;border:none;outline:none}
button{cursor:pointer;background:none;padding:0}
:root{--primary:#7C5CBF;--primary-light:#C8B5E8;--primary-dark:#5A3D9A;--secondary:#FF8FAB;--bg-card:#FFF;--text:#3A2A4A;--text-light:#8A7A9A;--shadow:rgba(124,92,191,.15);--gradient:linear-gradient(135deg,#7C5CBF,#FF8FAB);--radius-md:18px;--radius-lg:24px;--shadow-sm:0 2px 8px rgba(0,0,0,.06);--shadow-md:0 4px 20px rgba(0,0,0,.08);--match:#4CAF50;--mismatch:#E05959;--font-xl:1.75rem;--font-lg:1.25rem;--font-md:1rem;--font-sm:.875rem;--space-md:20px;--space-lg:32px}
.screen{display:none;flex-direction:column;min-height:100dvh;padding:var(--space-md);animation:fadeIn .4s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes float{0%,100%{transform:translateY(0)}25%{transform:translateY(-8px)}33%{transform:translateY(-4px)}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 32px;border-radius:50px;font-weight:700;font-size:var(--font-md);transition:all .3s ease}
.btn-primary{background:var(--gradient);color:#fff;box-shadow:0 4px 15px var(--shadow)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-secondary{background:var(--bg-card);color:var(--text);border:2px solid var(--primary-light)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:10px 20px;font-size:var(--font-sm)}
.btn-lg{padding:18px 40px;font-size:var(--font-lg)}
.btn-full{width:100%}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:100}
.landing-hero{text-align:center;padding:40px 0}
.landing-hero .em{font-size:4rem;display:block;animation:float 3s ease-in-out infinite}
.landing-hero h1{font-size:2rem;font-weight:900;margin:8px 0 4px}
.landing-hero .sub{color:var(--text-light);font-size:var(--font-sm);line-height:1.6}
.role-buttons{display:flex;flex-direction:column;gap:12px;max-width:360px;margin:24px auto;width:100%}
.role-btn{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--bg-card);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:2px solid transparent;transition:all .3s;cursor:pointer;width:100%;text-align:left}
.role-btn:hover{border-color:var(--primary-light);transform:translateY(-2px)}
.role-btn .ic{font-size:1.8rem;width:40px;text-align:center}
.role-btn .info{flex:1}
.role-btn .info strong{display:block;font-weight:800;color:var(--text)}
.role-btn .info span{font-size:var(--font-sm);color:var(--text-light)}
.role-btn .arrow{color:var(--text-light)}
.ch-cards{max-width:360px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:12px}
.ch-card{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--bg-card);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:2px solid transparent;transition:all .3s;cursor:pointer}
.ch-card:hover{border-color:var(--primary-light);transform:translateY(-2px)}
.ch-card .ic{font-size:1.8rem;width:40px;text-align:center}
.ch-card .info{flex:1}
.ch-card .info strong{display:block;font-weight:800;color:var(--text)}
.ch-card .info span{font-size:var(--font-sm);color:var(--text-light)}
.dim-box{border-radius:var(--radius-md);margin-bottom:12px;padding:16px;background:var(--bg-card);box-shadow:var(--shadow-sm)}
.dim-lbl{font-weight:700;font-size:var(--font-sm);margin-bottom:8px;text-align:center}
.dim-tog{display:flex;gap:8px}
.dim-opt{flex:1;padding:12px;border-radius:var(--radius-md);border:2px solid var(--primary-light);text-align:center;font-weight:700;cursor:pointer;background:var(--bg);transition:all .2s}
.dim-opt.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
.tp-res{text-align:center;padding:16px;margin-top:16px;background:var(--gradient);border-radius:var(--radius-lg);color:#fff}
.tp-res .code{font-size:2.5rem;font-weight:900;letter-spacing:6px}
.rp-header{text-align:center;padding:24px;border-radius:var(--radius-lg);background:var(--gradient);color:#fff;margin-bottom:16px}
.rp-header .type{font-size:2.5rem;font-weight:900;letter-spacing:5px}
.rp-header .type-name{font-size:var(--font-lg);font-weight:800;margin-top:4px}
.rp-sec{background:var(--bg-card);border-radius:var(--radius-md);padding:20px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.rp-sec .sec-t{font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rp-sec p{font-size:var(--font-sm);line-height:1.8;margin-bottom:8px}
.rp-other-input{max-width:360px;margin:0 auto;width:100%}
.rp-other-input input{width:100%;padding:16px;border:2px solid var(--primary-light);border-radius:var(--radius-md);font-size:1.5rem;font-weight:800;text-align:center;background:var(--bg-card);color:var(--primary);letter-spacing:8px;text-transform:uppercase;outline:none}
.rp-other-input input:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--shadow)}
.rp-tips{font-size:var(--font-sm);color:var(--text-light);line-height:1.6;padding:12px;background:var(--bg);border-radius:var(--radius-sm);max-width:360px;margin:12px auto}
.qz-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-md);margin-bottom:12px}
.qz-card .q-dim{display:inline-block;padding:2px 12px;border-radius:20px;background:var(--primary-light);color:var(--primary-dark);font-size:12px;font-weight:700}
.qz-card .q-em{font-size:2rem;display:block;margin:8px 0}
.qz-card .q-t{font-size:var(--font-lg);font-weight:800;margin-bottom:16px;line-height:1.5}
.bar{height:4px;background:var(--primary-light);border-radius:4px;margin-bottom:12px;overflow:hidden}
.bar .fill{height:100%;background:var(--gradient);transition:width .3s ease}
.sc-opts{display:flex;gap:4px;width:100%}
.sc-opt{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 2px;border:2px solid transparent;border-radius:8px;background:var(--bg);transition:all .2s}
.sc-opt:hover{border-color:var(--primary-light)}
.sc-opt.sel{border-color:var(--primary);background:var(--primary-light)}
.sc-opt .dot{width:32px;height:32px;border-radius:50%;background:var(--bg-card);border:2px solid var(--primary-light);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:var(--font-sm)}
.sc-opt.sel .dot{background:var(--primary);color:#fff;border-color:var(--primary)}
.sc-opt .tag{font-size:10px;color:var(--text-light)}
.sc-opt.sel .tag{color:var(--primary-dark);font-weight:700}
.sc-poles{display:flex;justify-content:space-between;font-size:var(--font-sm);font-weight:700;margin-bottom:6px;gap:8px}
.sc-poles .rt{text-align:right}
.qz-nav{display:flex;justify-content:space-between;align-items:center;margin:12px 0}
.rp-score{text-align:center;padding:16px;font-size:2rem;font-weight:900}
.rp-score .num{font-size:3rem}
.rp-dim{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--primary-light)}
.rp-dim .dv{padding:2px 12px;border-radius:20px;font-weight:700;font-size:var(--font-sm)}
.rp-dim .dv.match{background:var(--primary-light);color:var(--primary-dark)}
.rp-dim .dv.mis{background:#FFF0F0;color:var(--mismatch)}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="screen active" id="landing">
  <div class="landing-hero">
    <span class="em">🪞</span>
    <h1>人格镜像</h1>
    <div class="sub">你眼中的自己，和别人眼中的你<br>是不是同一个人？</div>
  </div>
  <div class="role-buttons">
    <button class="role-btn" onclick="g('choose')">
      <span class="ic">🧑</span>
      <span class="info"><strong>了解自己</strong><span>测一测或输入你的 MBTI，获得深度解析</span></span>
      <span class="arrow">→</span>
    </button>
    <button class="role-btn" onclick="g('other')">
      <span class="ic">👀</span>
      <span class="info"><strong>评价他人</strong><span>替 TA 答题，看看你眼中的 TA 和 TA 自己是否一样</span></span>
      <span class="arrow">→</span>
    </button>
  </div>
</div>

<div class="screen" id="choose">
  <div style="text-align:center;padding:24px 0">
    <span style="font-size:2.5rem">🧑</span>
    <h2 style="font-size:1.25rem;font-weight:900;margin:8px 0 4px">你了解自己的 MBTI 吗？</h2>
    <p style="font-size:var(--font-sm);color:var(--text-light)">选一个你喜欢的方式～</p>
  </div>
  <div class="ch-cards">
    <div class="ch-card" onclick="g('type')"><div class="ic">🎯</div><div class="info"><strong>我知道自己的 MBTI</strong><span>四个维度点选，10 秒搞定</span></div><span style="color:var(--text-light)">→</span></div>
    <div class="ch-card" onclick="startQuiz()"><div class="ic">📝</div><div class="info"><strong>我不确定，来测一下</strong><span>16 道题帮你定位人格</span></div><span style="color:var(--text-light)">→</span></div>
  </div>
  <div style="text-align:center;margin-top:16px"><button class="btn btn-secondary btn-sm" onclick="g('landing')">← 返回</button></div>
</div>

<div class="screen" id="other">
  <div style="text-align:center;padding:24px 0">
    <span style="font-size:2.5rem">👀</span>
    <h2 style="font-size:1.25rem;font-weight:900;margin:8px 0 4px">TA 的 MBTI 是什么？</h2>
    <p style="font-size:var(--font-sm);color:var(--text-light)">让 TA 告诉你 4 个字母，输进去然后替 TA 答题</p>
  </div>
  <div class="rp-other-input" style="margin-bottom:16px">
    <input id="ot-inp" maxlength="4" placeholder="ENFP" oninput="var v=this.value.toUpperCase().replace(/[^EISNTFJP]/g,'');this.value=v;document.getElementById('b-other').disabled=v.length!==4" onkeydown="if(event.key==='Enter')startO()">
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;align-items:center">
    <button class="btn btn-primary btn-lg" id="b-other" onclick="startO()" disabled>🧩 开始替 TA 答题</button>
    <button class="btn btn-secondary btn-sm" onclick="g('landing')">← 返回</button>
  </div>
  <div class="rp-tips">💡 TA 不知道自己的 MBTI？让 TA 点「了解自己」测一下</div>
</div>

<div class="screen" id="type">
  <div style="text-align:center;padding:16px 0">
    <span style="font-size:2.5rem">🎯</span>
    <h2 style="font-size:1.25rem;font-weight:900;margin:8px 0 4px">选填你的 MBTI</h2>
    <p style="font-size:var(--font-sm);color:var(--text-light)">四个维度各选一边</p>
  </div>
  <div id="type-picker"></div>
  <div style="margin-top:16px"><button class="btn btn-primary btn-lg btn-full" id="b-type" onclick="cfType()" disabled>✨ 查看人格解析</button></div>
  <div style="text-align:center;margin-top:12px"><button class="btn btn-secondary btn-sm" onclick="g('choose')">← 返回</button></div>
</div>

<div class="screen" id="quiz">
  <div class="bar"><div class="fill" id="qf"></div></div>
  <div id="qc"></div>
  <div class="qz-nav">
    <button class="btn btn-secondary btn-sm" onclick="qp()">← 上一题</button>
    <span id="qcnt">1/16</span>
    <button class="btn btn-primary btn-sm" id="qn" onclick="qn()">下一题 →</button>
  </div>
  <div style="text-align:center"><button class="btn btn-primary btn-lg" id="qs" onclick="qS()" style="display:none">✨ 查看报告</button></div>
</div>

<div class="screen" id="report"><div id="rc"></div><div style="text-align:center;margin-top:16px"><button class="btn btn-secondary btn-sm" onclick="g('landing')">🏠 返回首页</button></div></div>

<script>
const Q=[
{dim:'EI',l:'和朋友聚会后我感到精力充沛',r:'社交之后我需要独处来恢复能量',em:'⚡'},
{dim:'EI',l:'我倾向于边想边说',r:'我更习惯先想清楚再开口',em:'💭'},
{dim:'EI',l:'我享受成为众人关注的焦点',r:'我更喜欢待在幕后',em:'🎯'},
{dim:'EI',l:'我的朋友圈很广',r:'我的朋友不多但关系很深',em:'👥'},
{dim:'SN',l:'我更关注具体实在的事物',r:'我更喜欢思考未来的可能性',em:'🔍'},
{dim:'SN',l:'我习惯按经验和常规做事',r:'我热衷于尝试全新的方式',em:'🛤️'},
{dim:'SN',l:'我比较务实注重实际',r:'我喜欢天马行空地畅想',em:'🎨'},
{dim:'SN',l:'看剧时我关注具体情节',r:'我喜欢琢磨背后的隐喻',em:'📖'},
{dim:'TF',l:'做决定主要靠理性分析',r:'做决定更看重个人感受',em:'⚖️'},
{dim:'TF',l:'指出别人的问题很正常',r:'我倾向于委婉怕伤感受',em:'💬'},
{dim:'TF',l:'我把公正原则看得很重',r:'我把和谐人情看得很重',em:'🎭'},
{dim:'TF',l:'倾诉时我给解决方案',r:'倾诉时我给情感支持',em:'🤝'},
{dim:'JP',l:'我喜欢井井有条有规划',r:'我喜欢随性灵活自由',em:'📋'},
{dim:'JP',l:'完成任务让我有成就感',r:'我在截止前高效运作',em:'⏰'},
{dim:'JP',l:'我喜欢事情有明确结论',r:'我保持开放不急着下结论',em:'🔒'},
{dim:'JP',l:'旅行前我会做详细攻略',r:'我到了再说随遇而安',em:'🧳'},
];

// Minimal 16 types description to avoid Jekyll issues
const P={
ENFP:{n:'竞选者型',e:'🌈',s:'你内心装着无数可能和梦想',o:'你热情、开放、充满想象力，对世界充满好奇。你的快乐会传染，创造力会启发身边的人。',t:'你最大的天赋是让人感到被看见、被理解。你追求真诚和深度，讨厌虚伪和表面。',g:'✓ 创造力和想象力\n✓ 热情感染力\n✓ 强同理心\n✓ 拥抱变化',w:'✗ 三分钟热度\n✗ 组织力偏弱\n✗ 对批评敏感\n✗ 容易纠结',c:'创意行业、咨询、教育、公关、艺术',p:'给他们表达的空间和热情的回馈，别在第一时间否定他们的创意',r:'需要自由、新鲜感和深度连接，最好的关系是一起探索世界'},
INFP:{n:'调停者型',e:'🌙',s:'你的内心是一首诗，敏感、美丽、深邃',o:'你是最温柔的理想主义者。内心世界丰富而壮阔，追求真诚和意义，对美有天生感知力。',t:'你敏感、理想主义、富有创造力，有坚定价值观。你对别人的感受很在意，希望世界更美好。',g:'✓ 丰富的内心世界\n✓ 真诚不伪装\n✓ 强价值观\n✓ 深刻同理心',w:'✗ 过于敏感\n✗ 容易纠结\n✗ 脱离现实\n✗ 自我要求过高',c:'写作、艺术、心理、教育、设计',p:'温和耐心真诚，不要评判他们的感受，不要否定他们的理想',r:'追求灵魂上的契合，他们需要温柔耐心和真诚'},
INTJ:{n:'建筑师型',e:'🏛️',s:'你在脑海中构建世界，然后一步步变成现实',o:'天生的战略家和规划者。独立思考不随波逐流，追求的是精通和卓越。',t:'理性、独立、有远见，对自己和他人都有高标准。你可能显得冷漠，但内心有强烈信念。',g:'✓ 战略思维\n✓ 独立思考\n✓ 高执行力\n✓ 擅长复杂问题',w:'✗ 过于挑剔\n✗ 表达刻薄\n✗ 完美主义\n✗ 有时固执',c:'科技、工程、咨询、金融、法律、学术',p:'有逻辑有深度有准备，不要闲聊，直接进入正题',r:'可能不是最浪漫的伴侣，但可能是最可靠的'},
INTP:{n:'逻辑学家型',e:'🔬',s:'你有一颗不停运转的大脑，渴望理解一切',o:'思想家、理论家、永远的探索者。你的大脑时刻在分析、拆解、重建对世界的理解。',t:'理性、好奇、客观，追求逻辑上的一致。你对权威保持怀疑，享受探索抽象概念。',g:'✓ 分析洞察力\n✓ 创造性解决问题\n✓ 快速学习\n✓ 理性客观',w:'✗ 社交疏离\n✗ 执行力弱\n✗ 过度分析\n✗ 不擅表达情感',c:'研发、软件、数据科学、学术、战略规划',p:'要精确理性有趣，不要用权威压人，给他们时间思考',r:'需要理解他们思维方式的人，接受他们需要大量独处时间'},
ENFJ:{n:'主人公型',e:'🔥',s:'你的热情是火种，点燃每一个人的潜能',o:'天生的催化剂和引路者。你能看到别人身上的潜力并且知道如何激发它。',t:'热情有感染力，善于沟通也很有原则。你在意和谐但不会回避冲突。',g:'✓ 天生领导者\n✓ 极强同理心\n✓ 出色沟通\n✓ 善于培养他人',w:'✗ 过度关注他人\n✗ 对批评敏感\n✗ 容易过度付出\n✗ 难以拒绝',c:'教育、咨询、HR、公关、非营利管理',p:'真诚直接又温和，他们能看穿虚伪，先肯定再建议他们会接受',r:'需要深度情感连接和精神共鸣，最好的相处是真诚沟通'},

INFJ:{n:'提倡者型',e:'🌌',s:'你看到的不是表象，是本质。你追求的不是成功，是意义',o:'稀有的理想主义者。你不只是看到表面，你看到的是背后的模式和动机。',t:'富有洞察力和创造力，有强烈的价值观。善于倾听，也敢于为正确发声。',g:'✓ 深邃洞察力\n✓ 强同理心\n✓ 艺术天赋\n✓ 坚持原则',w:'✗ 过度吸收负面情绪\n✗ 完美主义\n✗ 过于理想化\n✗ 难以敞开心扉',c:'心理、教育、写作、艺术、非营利',p:'要真诚深入有温度，他们能感受到你是否真心',r:'需要深度情感联结和精神共鸣，需要被真正看见和理解'},

ISFP:{n:'探险家型',e:'🎨',s:'你用独一无二的眼光看世界，审美就是你的语言',o:'安静但内心丰富的艺术家。你对美有天生的敏感，能发现别人忽略的细节。',t:'温和敏感有艺术气质，享受真实的体验。不喜欢理论抽象，有自己的节奏。',g:'✓ 审美天赋\n✓ 温柔体贴\n✓ 适应力强\n✓ 有自己的风格',w:'✗ 过于谦逊\n✗ 回避冲突\n✗ 缺乏长线规划\n✗ 不够自信',c:'艺术、设计、音乐、摄影、烹饪',p:'温和直接不要太直接，不要催促他们做决定',r:'温柔浪漫有品位的伴侣，需要温柔耐心和空间'},
ISTJ:{n:'物流师型',e:'📌',s:'你是最可靠的人，不承诺则已，承诺必做到',o:'最可靠最有责任感的人。你说话算数做事靠谱，是任何团队里最让人放心的。',t:'认真负责有原则，尊重传统规则。做事有计划有条理，判断基于事实和经验。',g:'✓ 可靠性\n✓ 执行力\n✓ 注重细节\n✓ 危机中冷静',w:'✗ 有时固执\n✗ 接受新事物慢\n✗ 不善表达情感\n✗ 工作狂倾向',c:'法律、审计、会计、项目、行政',p:'直接具体有事实依据，不要夸大或含糊其辞',r:'靠谱忠诚稳重的伴侣，需要尊重和欣赏'},
ISTP:{n:'鉴赏家型',e:'🔧',s:'你动手去做而不是说。你是最冷静的观察者',o:'最务实最冷静的人。你善于理解事物运作原理，并且能动手去修去造去优化。',t:'冷静理性善于动手，对事物运作原理充满好奇。喜欢自由空间，不善表达。',g:'✓ 危机中冷静\n✓ 动手能力强\n✓ 逻辑清晰\n✓ 独立自主',w:'✗ 显得冷漠\n✗ 有时冒险过度\n✗ 不喜欢长期承诺\n✗ 不善表达情感',c:'工程、机械、体育、消防、飞行员',p:'简洁直接务实，不要废话不要情感绑架',r:'需要理解他们独立性的伴侣，用行动证明爱'},
};

const dims=['EI','SN','TF','JP'];
const dn={'EI':'⚡ 精力来源','SN':'🔍 认知方式','TF':'⚖️ 决策依据','JP':'📋 生活态度'};
const dl={'E':'外向','I':'内向','S':'感觉','N':'直觉','T':'理性','F':'感性','J':'计划','P':'随性'};

let S={mode:'',type:'',ans:[],qi:0,otherType:''};

const $=id=>document.getElementById(id);
function g(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');window.scrollTo(0,0)}

function startQuiz(){
  S.ans=Array.from({length:16},()=>null);S.qi=0;
  S.mode=S.otherType?'other':'self';
  renderQ();g('quiz');
}

function renderQ(){
  const q=Q[S.qi];
  $('#qf').style.width=`${(S.qi+1)/16*100}%`;
  $('#qcnt').textContent=`${S.qi+1}/16`;
  const lt=S.mode==='other'?q.l.replace(/我/g,'TA'):q.l,rt=S.mode==='other'?q.r.replace(/我/g,'TA'):q.r;
  const sv=S.ans[S.qi];
  const opts=[1,2,3,4,5].map(v=>`<div class="sc-opt${sv===v?' sel':''}" onclick="setA(${v})"><div class="dot">${v}</div><div class="tag">${['非常左','偏左','中立','偏右','非常右'][v-1]}</div></div>`).join('');
  $('#qc').innerHTML=`<div class="qz-card"><span class="q-dim">${dn[q.dim]}</span><div class="q-em">${q.em}</div><div class="q-t">${lt}</div><div class="sc-poles"><span>${lt}</span><span class="rt">${rt}</span></div><div class="sc-opts">${opts}</div></div>`;
  $('qn').style.display=S.qi===15?'none':'inline-flex';$('qs').style.display=S.qi===15?'inline-flex':'none';
}

function setA(v){S.ans[S.qi]=v;renderQ();if(S.qi<15){S.qi++;renderQ()}}
function qp(){if(S.qi>0){S.qi--;renderQ()}}
function qn(){if(S.ans[S.qi]===null)return;S.qi++;renderQ()}
function qS(){
  if(S.ans.some(a=>a===null))return;
  S.type=calc(S.ans);
  if(S.mode==='self')showR(S.type);
  else showC();
}

function calc(a){
  let t='';
  for(const d of dims){
    const ii=Q.map((q,i)=>q.dim===d?i:-1).filter(i=>i>=0);
    let s=0,c=0;
    ii.forEach(i=>{if(a[i]!==null&&a[i]!==undefined){s+=a[i];c++}});
    const avg=c?s/c:0;
    t+=c?avg<=2.5?{'EI':'E','SN':'S','TF':'T','JP':'J'}[d]:{'EI':'I','SN':'N','TF':'F','JP':'P'}[d]:'E';
  }
  return t;
}

function showR(type){
  const info=P[type]||P.ENFP;
  let html=`<div class="rp-header"><span style="font-size:3rem">${info.e}</span><div class="type">${type}</div><div class="type-name">${info.n}</div></div>`;
  html+=`<div class="rp-sec"><div class="sec-t">🔮 人格总览</div><p>${info.o}</p></div>`;
  html+=`<div class="rp-sec"><div class="sec-t">🧬 性格特质</div><p>${info.t}</p></div>`;
  html+=`<div class="rp-sec"><div class="sec-t">⭐ 核心优势</div><p style="white-space:pre-line">${info.g}</p></div>`;
  html+=`<div class="rp-sec"><div class="sec-t">🌱 成长方向</div><p style="white-space:pre-line">${info.w}</p></div>`;
  html+=`<div class="rp-sec"><div class="sec-t">💼 适合领域</div><p>${info.c}</p></div>`;
  html+=`<div class="rp-sec"><div class="sec-t">💬 沟通风格</div><p>${info.p}</p></div>`;
  html+=`<div class="rp-sec"><div class="sec-t">💕 亲密关系</div><p>${info.r}</p></div>`;
  html+=`<div class="rp-sec"><div class="sec-t">🔎 四维详解</div>${dims.map(d=>`<div style="margin-bottom:8px"><div style="font-weight:700;color:var(--primary-dark)">${dn[d]}</div><p>${desc(d,type[dims.indexOf(d)])}</p></div>`).join('')}</div>`;
  html+=`<div class="rp-sec" style="text-align:center;background:linear-gradient(135deg,var(--primary-light),#E8D5F5)"><p>想知道别人眼中的你？<br>让朋友点「评价他人」输入 <strong>${type}</strong> 就能对比 ✨</p></div>`;
  $('#rc').innerHTML=html;g('report');cfeti();
}

function desc(d,l){
  const t={
    E:'你从社交中获得能量，喜欢和人打交道。想法在交流中越来越清晰。',
    I:'你从独处中获得能量，深思熟虑后再表达。享受深度的交流。',
    S:'你关注具体事实和细节，相信眼见为实。务实、脚踏实地。',
    N:'你善于发现事物的本质和可能性，总能看到大局和未来。',
    T:'你做决定靠逻辑和分析，追求公平公正。理性是混乱中的定心丸。',
    F:'你做决定看感受和价值观，关注他人情绪。温暖和同理心是你的力量。',
    J:'你喜欢井井有条，计划和清单让你安心。习惯提前安排。',
    P:'你享受灵活自由，喜欢随遇而安。适应力强，能从容应对变化。'
  };
  return t[l]||'';
}

function startO(){
  const inp=$('ot-inp');
  if(!inp||inp.value.length!==4)return;
  if(!/^[EISNTFJP]{4}$/.test(inp.value))return;
  S.otherType=inp.value;
  S.mode='other';S.ans=Array.from({length:16},()=>null);S.qi=0;
  renderQ();g('quiz');
}

function showC(){
  const oT=calc(S.ans),sT=S.otherType;
  const si=P[sT]||P.ENFP,oi=P[oT]||P.ENFP;
  let mc=0,dH='';
  dims.forEach((d,i)=>{const m=sT[i]===oT[i];if(m)mc++;dH+=`<div class="rp-dim"><span>${dn[d]}</span><span class="dv ${m?'match':'mis'}">${m?'✅ '+dl[sT[i]]:'你'+dl[sT[i]]+'·TA看'+dl[oT[i]]}</span></div>`});
  const mp=Math.round(mc/4*100);
  let ad='';
  for(let i=0;i<4;i++){if(sT[i]!==oT[i])ad+=`<strong>${dn[dims[i]]}</strong>维度上，你觉得自己偏${dl[sT[i]]}，但TA觉得你更像${dl[oT[i]]}。<br><br>`}
  if(!ad)ad='🎯 四个维度全部一致！你活得真实通透。';
  else ad+=`每个人都是一面多棱镜，在不同角度下折射出不同的光。`;
  const r=`<div class="rp-header"><span style="font-size:3rem">🪞</span><div class="type">${sT} vs ${oT}</div><div class="type-name">自我认知 vs 他人眼中</div></div>
  <div class="rp-sec" style="text-align:center"><div class="rp-score"><div class="num">${mp}%</div><div>维度一致率（${mc}/4）</div></div></div>
  <div class="rp-sec"><div class="sec-t">📊 逐维对比</div>${dH}</div>
  <div class="rp-sec"><div class="sec-t">💡 深度解读</div><p>${ad}</p></div>
  <div class="rp-sec"><div class="sec-t">👀 TA觉得你是这样的人</div><p>在TA眼中你是<strong>${oT} ${oi.n}</strong><br>${oi.o}</p></div>
  <div class="rp-sec"><div class="sec-t">🪞 你眼中的自己</div><p>你认为自己是<strong>${sT} ${si.n}</strong><br>${si.o}</p></div>
  <div class="rp-sec"><div class="sec-t">💬 沟通建议</div><p>${si.p}</p></div>`;
  $('#rc').innerHTML=r;g('report');cfeti();
}

// Type picker
const pt={EI:null,SN:null,TF:null,JP:null};
function bd(el,d,v){document.querySelectorAll(`.dim-opt[data-d="${d}"]`).forEach(e=>e.classList.remove('sel'));el.classList.add('sel');pt[d]=v;up()}
function up(){
  if(Object.values(pt).every(v=>v!==null)&&!$('tp-res')){
    const t=pt.EI+pt.SN+pt.TF+pt.JP;
    $('type-picker').insertAdjacentHTML('beforeend',`<div class="tp-res" id="tp-res"><div class="code">${t}</div><div style="opacity:.9">${P[t]?.n||''}</div></div>`);
    S.type=t;$('b-type').disabled=false;
  }
}
function cfType(){if(S.type)showR(S.type)}

// Init type picker UI
$('type-picker').innerHTML=dims.map(d=>`<div class="dim-box"><div class="dim-lbl">${dn[d]}</div><div class="dim-tog"><div class="dim-opt" onclick="bd(this,'${d}','${d[0]}')">${d[0]==='E'?'外向':d[0]==='S'?'感觉':d[0]==='T'?'理性':'计划'}</div><div class="dim-opt" onclick="bd(this,'${d}','${d[1]}')">${d[1]==='I'?'内向':d[1]==='N'?'直觉':d[1]==='F'?'感性':'随性'}</div></div></div>`).join('');

// Confetti
let cfr=false,cp=[];
function cfeti(d=4000){
  const c=$('confetti-canvas');c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');
  const cs=['#7C5CBF','#FF8FAB','#FFD93D','#C8B5E8','#8FBC8F','#FFD700'];
  cp=Array.from({length:60},()=>({x:Math.random()*c.width,y:-Math.random()*c.height,w:5+Math.random()*8,h:3+Math.random()*5,color:cs[~~(Math.random()*cs.length)],s:2+Math.random()*3,r:Math.random()*360,rs:(Math.random()-.5)*6,sw:Math.random()*2-1}));
  cfr=true;const st=Date.now();
  function dr(){if(!cfr){ctx.clearRect(0,0,c.width,c.height);cp=[];return}ctx.clearRect(0,0,c.width,c.height);cp.forEach(p=>{p.y+=p.s;p.x+=Math.sin(p.y*.02)*p.sw;p.r+=p.rs;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()});cp.forEach(p=>{if(p.y>c.height+20){p.y=-20;p.x=Math.random()*c.width}});if(Date.now()-st>d)cfr=false;if(cfr)requestAnimationFrame(dr)}dr();
}

document.addEventListener('DOMContentLoaded',()=>{console.log('✅ 人格镜像加载完成')});
</script>
