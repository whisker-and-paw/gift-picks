<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7C5CBF">
<title>人格镜像 · MBTI 深度解析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#F5F0FF 0%,#FFF5F5 100%);color:#3A2A4A;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input{font-family:inherit;font-size:inherit;border:none;outline:none}
button{cursor:pointer;background:none;padding:0}
:root{--primary:#7C5CBF;--primary-light:#C8B5E8;--primary-dark:#5A3D9A;--secondary:#FF8FAB;--secondary-light:#FFC8D8;--accent:#FFD93D;--bg:#F8F4FF;--bg-card:#FFF;--text:#3A2A4A;--text-light:#8A7A9A;--text-muted:#B0A0C0;--shadow:rgba(124,92,191,.15);--gradient:linear-gradient(135deg,#7C5CBF,#FF8FAB);--radius-sm:12px;--radius-md:18px;--radius-lg:24px;--shadow-sm:0 2px 8px rgba(0,0,0,.06);--shadow-md:0 4px 20px rgba(0,0,0,.08);--shadow-lg:0 8px 40px rgba(0,0,0,.1);--match:#4CAF50;--mismatch:#E05959;--font-xl:1.75rem;--font-lg:1.25rem;--font-md:1rem;--font-sm:.875rem;--space-xs:6px;--space-sm:12px;--space-md:20px;--space-lg:32px}
.screen{display:none;flex-direction:column;min-height:100dvh;padding:var(--space-md);animation:fadeIn .4s ease;position:relative}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}25%{transform:translateY(-8px)}33%{transform:translateY(-4px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:100}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 32px;border-radius:50px;font-weight:700;font-size:var(--font-md);transition:all .3s ease}
.btn-primary{background:var(--gradient);color:#fff;box-shadow:0 4px 15px var(--shadow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 25px var(--shadow)}
.btn-secondary{background:var(--bg-card);color:var(--text);border:2px solid var(--primary-light)}
.btn-secondary:hover{background:var(--primary-light)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-sm{padding:10px 20px;font-size:var(--font-sm)}
.btn-lg{padding:18px 40px;font-size:var(--font-lg)}
.btn-full{width:100%}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;background:var(--text);color:#fff;border-radius:50px;font-size:var(--font-sm);font-weight:600;box-shadow:var(--shadow-lg);z-index:300;animation:slideUp .3s ease;max-width:90%}

/* LANDING */
#screen-landing .content{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:var(--space-lg);max-width:400px;margin:0 auto;width:100%}
.landing-hero{text-align:center;animation:fadeUp .8s ease}
.landing-hero .em{font-size:4rem;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.landing-hero h1{font-size:2rem;font-weight:900;color:var(--text);margin-bottom:4px}
.landing-hero .sub{color:var(--text-light);line-height:1.7;max-width:320px;margin:0 auto;font-size:var(--font-sm)}
.role-buttons{display:flex;flex-direction:column;gap:var(--space-sm);width:100%;animation:fadeUp 1s ease}
.role-btn{display:flex;align-items:center;gap:14px;padding:18px 24px;background:var(--bg-card);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:2px solid transparent;transition:all .3s ease;width:100%;text-align:left}
.role-btn:hover{border-color:var(--primary-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.role-btn .ic{font-size:2rem;width:48px;text-align:center}
.role-btn .info{flex:1}
.role-btn .info strong{display:block;font-size:var(--font-md);font-weight:800;color:var(--text)}
.role-btn .info span{font-size:var(--font-sm);color:var(--text-light)}
.role-btn .arrow{font-size:1.2rem;color:var(--text-muted);transition:transform .3s ease}
.role-btn:hover .arrow{transform:translateX(4px);color:var(--primary)}

/* CHOOSE */
.ch-hdr{text-align:center;padding:var(--space-lg) 0}
.ch-hdr .em{font-size:2.5rem;display:block;margin-bottom:8px}
.ch-hdr h2{font-size:var(--font-lg);font-weight:800;color:var(--text)}
.ch-hdr p{font-size:var(--font-sm);color:var(--text-light);margin-top:4px}
.ch-cards{display:flex;flex-direction:column;gap:var(--space-sm)}
.ch-card{display:flex;align-items:center;gap:14px;padding:20px 24px;background:var(--bg-card);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:2px solid transparent;transition:all .3s ease;cursor:pointer}
.ch-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.ch-card .ic{font-size:2rem;width:48px;text-align:center}
.ch-card .info{flex:1}
.ch-card .info strong{display:block;font-size:var(--font-md);font-weight:800;color:var(--text)}
.ch-card .info span{font-size:var(--font-sm);color:var(--text-light)}
.ch-card .arrow{font-size:1.2rem;color:var(--text-muted)}

/* TYPE PICKER */
.tp-hdr{text-align:center;padding:var(--space-md) 0}
.tp-hdr .em{font-size:2.5rem;display:block;margin-bottom:8px}
.tp-hdr h2{font-size:var(--font-lg);font-weight:800;color:var(--text)}
.tp-hdr p{font-size:var(--font-sm);color:var(--text-light);margin-top:4px}
.dim-box{border-radius:var(--radius-md);margin-bottom:var(--space-sm);padding:var(--space-md);background:var(--bg-card);box-shadow:var(--shadow-sm)}
.dim-lbl{font-weight:700;font-size:var(--font-sm);color:var(--text);margin-bottom:10px;text-align:center}
.dim-tog{display:flex;gap:8px;justify-content:center}
.dim-opt{flex:1;padding:14px 8px;border-radius:var(--radius-md);border:2px solid var(--primary-light);text-align:center;font-weight:700;font-size:var(--font-md);color:var(--text-light);transition:all .2s ease;cursor:pointer;background:var(--bg)}
.dim-opt:hover{border-color:var(--primary)}
.dim-opt.sel{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 0 4px var(--shadow)}
.tp-res{text-align:center;padding:var(--space-md);margin-top:var(--space-md);background:var(--gradient);border-radius:var(--radius-lg);color:#fff}
.tp-res .code{font-size:2.5rem;font-weight:900;letter-spacing:6px}
.tp-res .lbl{font-size:var(--font-sm);opacity:.9;margin-top:4px}

/* QUIZ */
.qz-hdr{text-align:center;padding:var(--space-md) 0}
.qz-hdr .em{font-size:2rem;display:block;margin-bottom:4px}
.qz-hdr h2{font-size:var(--font-lg);font-weight:800;color:var(--text)}
.qz-hdr p{font-size:var(--font-sm);color:var(--text-light);margin-top:2px}
.qz-bar{height:4px;background:var(--primary-light);border-radius:4px;margin-bottom:var(--space-md);overflow:hidden}
.qz-bar .fill{height:100%;background:var(--gradient);border-radius:4px;transition:width .3s ease}
.qz-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:var(--space-lg);box-shadow:var(--shadow-md);margin-bottom:var(--space-md);animation:fadeUp .3s ease}
.qz-card .q-dim{display:inline-block;padding:2px 12px;border-radius:20px;background:var(--primary-light);color:var(--primary-dark);font-size:12px;font-weight:700;margin-bottom:8px}
.qz-card .q-em{font-size:2rem;display:block;margin-bottom:8px}
.qz-card .q-t{font-size:var(--font-lg);font-weight:800;color:var(--text);margin-bottom:var(--space-lg);line-height:1.5}
.qz-opts .sc-scale{display:flex;flex-direction:column;gap:8px;align-items:center}
.qz-opts .sc-poles{display:flex;justify-content:space-between;width:100%;font-size:var(--font-sm);color:var(--text);font-weight:700;line-height:1.4;gap:8px}
.qz-opts .sc-poles .sp{max-width:40%;font-size:var(--font-sm)}
.qz-opts .sc-poles .sp.rt{text-align:right}
.qz-opts .sc-options{display:flex;gap:4px;justify-content:center;width:100%}
.qz-opts .sc-opt{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 2px;flex:1;border-radius:var(--radius-sm);transition:all .2s;border:2px solid transparent;background:var(--bg)}
.qz-opts .sc-opt:hover{border-color:var(--primary-light)}
.qz-opts .sc-opt.sel{border-color:var(--primary);background:var(--primary-light)}
.qz-opts .sc-opt .dot{width:32px;height:32px;border-radius:50%;background:var(--bg-card);border:2px solid var(--primary-light);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:var(--font-sm);color:var(--text-light);transition:all .2s}
.qz-opts .sc-opt.sel .dot{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 0 3px var(--shadow)}
.qz-opts .sc-opt .tag{font-size:10px;color:var(--text-light);font-weight:600}
.qz-opts .sc-opt.sel .tag{color:var(--primary-dark);font-weight:700}
.qz-nav{display:flex;gap:var(--space-sm);justify-content:space-between;align-items:center;margin-bottom:var(--space-md)}
.qz-nav .count{font-size:var(--font-sm);color:var(--text-light);font-weight:600}

/* REPORT */
#screen-report .content{flex:1;max-width:560px;margin:0 auto;width:100%;padding:var(--space-md) 0}
.rp-header{text-align:center;padding:var(--space-lg);border-radius:var(--radius-lg);background:var(--gradient);color:#fff;margin-bottom:var(--space-lg)}
.rp-header .em{font-size:3rem;display:block;margin-bottom:8px}
.rp-header .type{font-size:2.5rem;font-weight:900;letter-spacing:5px}
.rp-header .type-name{font-size:var(--font-lg);font-weight:800;margin-top:2px;opacity:.9}
.rp-header .tagline{font-size:var(--font-sm);opacity:.8;margin-top:6px;font-style:italic}
.rp-sec{background:var(--bg-card);border-radius:var(--radius-md);padding:var(--space-lg);margin-bottom:var(--space-sm);box-shadow:var(--shadow-sm)}
.rp-sec .sec-t{font-size:var(--font-md);font-weight:800;margin-bottom:var(--space-sm);display:flex;align-items:center;gap:8px}
.rp-sec .sec-t .ic{font-size:1.3rem}
.rp-sec p{font-size:var(--font-sm);line-height:1.8;color:var(--text);margin-bottom:8px}
.rp-sec p:last-child{margin-bottom:0}
.rp-dim{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--primary-light)}
.rp-dim:last-child{border-bottom:none}
.rp-dim .dl{font-weight:700;font-size:var(--font-sm)}
.rp-dim .dv{font-weight:700;font-size:var(--font-sm);padding:2px 12px;border-radius:20px}
.rp-dim .dv.match{background:var(--primary-light);color:var(--primary-dark)}
.rp-dim .dv.mis{background:#FFF0F0;color:var(--mismatch)}
.rp-dim-bar{width:100%;height:6px;background:var(--primary-light);border-radius:3px;margin:6px 0 10px;position:relative}
.rp-dim-bar .f{height:100%;border-radius:3px;transition:width .6s ease}
.rp-compare{display:flex;justify-content:space-between;font-size:12px;color:var(--text-light);font-weight:600;margin-top:2px}
.rp-score{text-align:center;padding:var(--space-md);font-size:2rem;font-weight:900}
.rp-score .num{font-size:3rem}
.rp-score .lbl{font-size:var(--font-sm);color:var(--text-light);font-weight:400;margin-top:4px}
.rp-ft{text-align:center;margin-top:var(--space-md)}
.rp-other-input{margin:var(--space-md) 0}
.rp-other-input input{width:100%;padding:14px;border:2px solid var(--primary-light);border-radius:var(--radius-md);font-size:1.3rem;font-weight:800;text-align:center;background:var(--bg-card);color:var(--primary);letter-spacing:6px;text-transform:uppercase;outline:none}
.rp-other-input input:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--shadow)}
.rp-tips{font-size:var(--font-sm);color:var(--text-light);line-height:1.7;margin-top:var(--space-sm);background:var(--bg);padding:var(--space-md);border-radius:var(--radius-md)}

@media(max-width:400px){
  html{font-size:14px}
  .rp-header .type{font-size:2rem}
  .qz-card{padding:var(--space-md)}
}
</style>
</head>
<body>
<div id="tc"></div>
<canvas id="confetti-canvas"></canvas>

<!-- ===== LANDING ===== -->
<div class="screen active" id="screen-landing">
  <div class="content">
    <div class="landing-hero">
      <span class="em">🪞</span>
      <h1>人格镜像</h1>
      <div class="sub">你眼中的自己，和别人眼中的你<br>是不是同一个人？</div>
    </div>
    <div class="role-buttons">
      <button class="role-btn" onclick="goSelf()">
        <span class="ic">🧑</span>
        <span class="info"><strong>了解自己</strong><span>测一测或输入你的 MBTI，获得深度解析</span></span>
        <span class="arrow">→</span>
      </button>
      <button class="role-btn" onclick="goOther()">
        <span class="ic">👀</span>
        <span class="info"><strong>评价他人</strong><span>替 TA 答题，看看你眼中的 TA 和 TA 自己是否一样</span></span>
        <span class="arrow">→</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== CHOOSE METHOD ===== -->
<div class="screen" id="screen-choose">
  <div class="content" style="flex:1;max-width:480px;margin:0 auto;width:100%;padding:var(--space-md) 0">
    <div class="ch-hdr">
      <div class="em">🧑</div>
      <h2>你了解自己的 MBTI 吗？</h2>
      <p>选一个你喜欢的方式～</p>
    </div>
    <div class="ch-cards">
      <div class="ch-card" onclick="goPickType()">
        <div class="ic">🎯</div>
        <div class="info"><strong>我知道自己的 MBTI</strong><span>四个维度点选，10 秒搞定</span></div>
        <div class="arrow">→</div>
      </div>
      <div class="ch-card" onclick="goSelfQuiz()">
        <div class="ic">📝</div>
        <div class="info"><strong>我不确定，来测一下</strong><span>16 道生活化题目，帮你定位人格</span></div>
        <div class="arrow">→</div>
      </div>
    </div>
    <div style="text-align:center;padding:var(--space-md) 0 0"><button class="btn btn-secondary" onclick="ss('screen-landing')">← 返回</button></div>
  </div>
</div>

<!-- ===== TYPE PICKER ===== -->
<div class="screen" id="screen-type">
  <div class="content" style="flex:1;max-width:480px;margin:0 auto;width:100%;padding:var(--space-md) 0">
    <div class="tp-hdr">
      <div class="em">🎯</div>
      <h2>选填你的 MBTI</h2>
      <p>四个维度各选一边</p>
    </div>
    <div class="dim-box"><div class="dim-lbl">⚡ 能量来源</div>
      <div class="dim-tog"><div class="dim-opt" data-d="EI" data-v="E" onclick="pickD(this,'EI','E')">E 外向</div><div class="dim-opt" data-d="EI" data-v="I" onclick="pickD(this,'EI','I')">I 内向</div></div></div>
    <div class="dim-box"><div class="dim-lbl">🔍 认知方式</div>
      <div class="dim-tog"><div class="dim-opt" data-d="SN" data-v="S" onclick="pickD(this,'SN','S')">S 感觉</div><div class="dim-opt" data-d="SN" data-v="N" onclick="pickD(this,'SN','N')">N 直觉</div></div></div>
    <div class="dim-box"><div class="dim-lbl">⚖️ 决策依据</div>
      <div class="dim-tog"><div class="dim-opt" data-d="TF" data-v="T" onclick="pickD(this,'TF','T')">T 理性</div><div class="dim-opt" data-d="TF" data-v="F" onclick="pickD(this,'TF','F')">F 感性</div></div></div>
    <div class="dim-box"><div class="dim-lbl">📋 生活态度</div>
      <div class="dim-tog"><div class="dim-opt" data-d="JP" data-v="J" onclick="pickD(this,'JP','J')">J 计划</div><div class="dim-opt" data-d="JP" data-v="P" onclick="pickD(this,'JP','P')">P 随性</div></div></div>
    <div class="tp-res" id="tp-res" style="display:none">
      <div class="code" id="tp-code">ENFP</div>
      <div class="lbl" id="tp-lbl"></div>
    </div>
    <div style="margin-top:var(--space-md)">
      <button class="btn btn-primary btn-lg btn-full" id="btn-confirm-type" onclick="confirmSelfType()" disabled>✨ 查看我的人格解析</button>
    </div>
    <div style="margin-top:var(--space-sm);text-align:center"><button class="btn btn-secondary" onclick="ss('screen-choose')">← 返回</button></div>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div class="screen" id="screen-quiz">
  <div class="content" style="flex:1;max-width:520px;margin:0 auto;width:100%;padding:var(--space-md) 0">
    <div class="qz-hdr"><div class="em">📝</div><h2 id="qz-title">测测你的人格画像</h2><p id="qz-sub">16 道题，从四个维度了解自己</p></div>
    <div class="qz-bar"><div class="fill" id="qzf" style="width:0%"></div></div>
    <div id="qzc"></div>
    <div class="qz-nav">
      <button class="btn btn-secondary btn-sm" id="btn-qp" onclick="qPrev()">← 上一题</button>
      <span class="count" id="qcount">1/16</span>
      <button class="btn btn-primary btn-sm" id="btn-qn" onclick="qNext()">下一题 →</button>
    </div>
    <div class="qz-sub" style="text-align:center">
      <button class="btn btn-primary btn-lg" id="btn-qs" onclick="qSubmit()" style="display:none">✨ 查看人格解析</button>
    </div>
  </div>
</div>

<!-- ===== REPORT ===== -->
<div class="screen" id="screen-report">
  <div class="content">
    <div id="report-content"></div>
    <div class="rp-ft"><button class="btn btn-secondary" onclick="ss('screen-landing')">🏠 返回首页</button></div>
  </div>
</div>

<script>
// ============================================================
const QS = [
  {dim:'EI',left:'和朋友聚会后我感到精力充沛',right:'社交之后我需要独处来恢复能量',em:'⚡'},
  {dim:'EI',left:'我倾向于边想边说，在交流中理清思路',right:'我更习惯先想清楚再开口',em:'💭'},
  {dim:'EI',left:'我享受成为众人关注的焦点',right:'我更喜欢待在幕后不被注意',em:'🎯'},
  {dim:'EI',left:'我的朋友圈很广，认识很多人',right:'我的朋友不多但关系都很深',em:'👥'},
  {dim:'SN',left:'我更关注眼前具体实在的事物',right:'我更喜欢思考未来的可能性',em:'🔍'},
  {dim:'SN',left:'我习惯按照已有经验和常规做事',right:'我热衷于尝试全新的方式',em:'🛤️'},
  {dim:'SN',left:'我通常比较务实，注重实际效果',right:'我更喜欢天马行空地畅想',em:'🎨'},
  {dim:'SN',left:'阅读/看剧时我关注具体情节',right:'我更喜欢琢磨背后的隐喻和主题',em:'📖'},
  {dim:'TF',left:'做决定时我主要靠理性分析',right:'做决定时我更看重个人感受',em:'⚖️'},
  {dim:'TF',left:'指出别人的问题对我来说很正常',right:'我倾向于委婉，怕伤害对方感受',em:'💬'},
  {dim:'TF',left:'我把公正和原则看得很重',right:'我把和谐与人情看得很重',em:'🎭'},
  {dim:'TF',left:'别人找我倾诉时我习惯给解决方案',right:'别人找我倾诉时我习惯给情感支持',em:'🤝'},
  {dim:'JP',left:'我喜欢生活井井有条有规划',right:'我喜欢随性灵活自由安排',em:'📋'},
  {dim:'JP',left:'完成任务清单让我很有成就感',right:'我经常在截止前才高效运作',em:'⏰'},
  {dim:'JP',left:'我更喜欢事情有明确的结论',right:'我乐于保持开放不急着下结论',em:'🔒'},

let cfr=false,cp=[];
function cfeti(d=4000){
  const c=$('confetti-canvas');c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');
  const cs=['#7C5CBF','#FF8FAB','#FFD93D','#C8B5E8','#8FBC8F','#FFD700','#5A3D9A','#FFB06A'];
  cp=Array.from({length:80},()=>({x:Math.random()*c.width,y:-Math.random()*c.height,w:5+Math.random()*8,h:3+Math.random()*5,color:cs[~~(Math.random()*cs.length)],s:2+Math.random()*3,r:Math.random()*360,rs:(Math.random()-.5)*6,sw:Math.random()*2-1}));
  cfr=true;const st=Date.now();
  function dr(){if(!cfr){ctx.clearRect(0,0,c.width,c.height);cp=[];return}ctx.clearRect(0,0,c.width,c.height);cp.forEach(p=>{p.y+=p.s;p.x+=Math.sin(p.y*.02)*p.sw;p.r+=p.rs;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()});cp.forEach(p=>{if(p.y>c.height+20){p.y=-20;p.x=Math.random()*c.width}});if(Date.now()-st>d)cfr=false;if(cfr)requestAnimationFrame(dr);else ctx.clearRect(0,0,c.width,c.height)}
  dr();
}

function calcMBTI(a){
  const dims=['EI','SN','TF','JP'],p1={'EI':'E','SN':'S','TF':'T','JP':'J'};let t='';
  for(const d of dims){
    const ii=QS.map((q,i)=>q.dim===d?i:-1).filter(i=>i>=0);let s=0,c=0;
    ii.forEach(i=>{if(a[i]!==null&&a[i]!==undefined){s+=a[i];c++}});
    const avg=c?s/c:0;
    t+=c?avg<=2.5?p1[d]:{'EI':'I','SN':'N','TF':'F','JP':'P'}[d]:p1[d];
  }
  return t;
}

function calcScores(a){
  // Returns percentage for first pole (E/S/T/J) per dimension
  const dims=['EI','SN','TF','JP'];
  const r={};
  for(const d of dims){
    const ii=QS.map((q,i)=>q.dim===d?i:-1).filter(i=>i>=0);let s=0,c=0;
    ii.forEach(i=>{if(a[i]!==null&&a[i]!==undefined){s+=a[i];c++}});
    const avg=c?s/c:0;
    // 1=100% left, 5=100% right. Convert to percentage for left pole
    r[d]=Math.round(((5-avg)/4)*100);
  }
  return r;
}

function qSubmit(){
  if(S.answers.some(a=>a===null)){to('请完成所有题目～');return}
  const type = calcMBTI(S.answers);
  S.selfType = type;
  ck();
  if(S.mode === 'self') showSelfReport(type, S.answers);
  else showCompareReport(S.selfType, S.answers);
}

      ${dims.map(d=>`<div style="margin-bottom:10px">
        <div style="font-weight:700;font-size:var(--font-sm);color:var(--primary-dark)">${DN[d]}</div>
        <p style="font-size:var(--font-sm);margin-top:2px">${MT[type[dims.indexOf(d)]]?.desc||''}</p>
      </div>`).join('')}
    </div>

    <div class="rp-sec">
      <div class="sec-t"><span class="ic">🤝</span> 相处之道</div>
      <p>${getRelationTip(type)}</p>
    </div>

    ${answers ? `
    <div class="rp-sec">
      <div class="sec-t"><span class="ic">👀</span> 想知道别人眼中的你吗？</div>
      <p>让身边的朋友打开这个页面，选「评价他人」<br>输入你的 MBTI 类型 <strong>${type}</strong>，替 TA 答题<br>就能看到你眼中的自己 vs 别人眼中的你的对比分析 ✨</p>
    </div>
    ` : ''}
  `;

  $('#report-content').innerHTML = report;
  cl();cfeti(5000);
  ss('screen-report');
}

// ===== COMPARE REPORT =====
function showCompareReport(selfType, otherAnswers){
  const otherType = calcMBTI(otherAnswers);
  const scores = calcScores(otherAnswers);
  const dims=['EI','SN','TF','JP'];
  const info = TI[selfType] || TI['ENFP'];
  const otherInfo = TI[otherType] || TI['ENFP'];

  let matchCount = 0;
  let dimHtml = '';
  dims.forEach((d,i)=>{
    const sp = selfType[i], op = otherType[i];
    const isMatch = sp === op;
    if(isMatch) matchCount++;
    const pct = scores[d];
    const lt = DP[d][0], rt = DP[d][1];
    const pole = pct >= 50 ? lt : rt;
    const spLabel = MT[sp]?.name||sp, opLabel = MT[op]?.name||op;
    dimHtml += `<div class="rp-dim">
      <span class="dl">${DN[d]}</span>
      <span class="dv ${isMatch?'match':'mis'}">${isMatch?'✅ '+spLabel:'你'+spLabel+' · TA看'+opLabel}</span>
    </div>`;
  });

  const matchPct = Math.round(matchCount/4*100);
  const analysis = generateAnalysis(selfType, otherType);

  // Get self descriptions
  const selfInfo = TI[selfType];

  const report = `
    <div class="rp-header">
      <div class="em">🪞</div>
      <div class="type">${selfType} vs ${otherType}</div>
      <div class="type-name">自我认知 vs 他人眼中</div>
    </div>

    <div class="rp-sec" style="text-align:center">
      <div class="rp-score"><span class="num">${matchPct}%</span><div class="lbl">维度一致率（${matchCount}/4）</div></div>
    </div>

    <div class="rp-sec">
      <div class="sec-t"><span class="ic">📊</span> 逐维对比</div>
      ${dimHtml}
    </div>

    <div class="rp-sec">
      <div class="sec-t"><span class="ic">💡</span> 深度解读</div>
      <p>${analysis}</p>
    </div>

    <div class="rp-sec">
      <div class="sec-t"><span class="ic">🔮</span> TA 心目中你的样子</div>
      <p>在 TA 眼中，你是 <strong>${otherType} ${otherInfo.name}</strong> 类型。</p>
      <p>${otherInfo.t}</p>
    </div>

    <div class="rp-sec">
      <div class="sec-t"><span class="ic">🪞</span> 你眼中的自己</div>
      <p>你认为自己是 <strong>${selfType} ${selfInfo.name}</strong> 类型。</p>
      <p>${selfInfo.t}</p>
    </div>

    <div class="rp-sec" style="text-align:center">
      <div class="sec-t"><span class="ic">💝</span></div>
      <p>${matchPct >= 75 ? '你们真的很了解彼此！这份默契让人羡慕 ✨' : matchPct >= 50 ? '有一些默契，但还有更多惊喜等着你去发现 🌱' : '每个人都是一面多棱镜，在不同角度下折射出不同的光。这些差异不是对错，而是你丰富人格的体现 🌈'}</p>
    </div>
  `;

  $('#report-content').innerHTML = report;
  cl();cfeti(5000);
  ss('screen-report');
}

// ===== ANALYSIS =====
function generateAnalysis(self, other){
  const dims=['EI','SN','TF','JP'];
  const diffs = [];
  for(let i=0;i<4;i++){
    if(self[i] !== other[i]){
      const d = dims[i];
      diffs.push(`<strong>${DN[d]}</strong>维度上，你觉得自己偏${MT[self[i]]?.name||self[i]}，但 TA 觉得你更像${MT[other[i]]?.name||other[i]}。`);
    }
  }
  if(diffs.length === 0){
    return '🎯 四个维度全部一致！你在他人眼中展现出的样子，就是你内心真实的自己。这种内外一致性非常珍贵——你活得真实、通透，身边的人看到的也是真正的你。';
  }
  let r = '你们的认知存在一些有趣的差异：<br><br>'+diffs.join('<br><br>');
  r += '<br><br>每个人都是一面多棱镜，在不同角度下折射出不同的光。这些差异不是谁的"错"，而是你丰富人格在不同人眼中的真实投影。';
  return r;
}
